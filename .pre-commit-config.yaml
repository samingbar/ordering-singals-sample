repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  - repo: local
    hooks:
      - id: biome
        name: Run Biome
        entry: npm run lint
        language: system
        pass_filenames: false

      - id: typecheck
        name: Run TypeScript compiler
        entry: npm run build
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

      - id: vitest
        name: Run Vitest
        entry: npm test
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true

default_stages: [pre-commit]
fail_fast: false
