<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendor Simulator</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Vendor Simulator</p>
          <h1>Messy Callback Delivery, On Purpose</h1>
          <p>
            Send acknowledge, confirm, ASN, invoice, credit, duplicate, delayed, and
            scenario-based updates in any order.
          </p>
        </div>
        <a class="button" href="http://localhost:4000" target="_blank" rel="noreferrer">
          Open ByteInventory UI
        </a>
      </header>

      <main class="panel">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Known Orders</p>
            <h2>Vendor-Side Order Controls</h2>
          </div>
          <button id="refresh-button" class="button subtle">Refresh</button>
        </div>
        <div id="vendor-order-list" class="order-grid"></div>
      </main>
    </div>

    <script src="/app.js" defer></script>
  </body>
  </html>
